<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta property="og:image" content="https://myplopplop.com/assets/img/og-preview.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<title>Login — MyPlopPlop</title>
<meta name="description" content="Sign in or create your MyPlopPlop account. Order delivery across Haiti or support family from abroad.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<style>
/* ===== AUTH PAGE ===== */
.auth-wrapper {
    display: flex;
    justify-content: center;
    padding: var(--space-lg) var(--content-padding) calc(var(--bottom-nav-height) + var(--space-xl));
}
.auth-card {
    width: 100%;
    max-width: 420px;
}
.auth-logo {
    text-align: center;
    margin-bottom: var(--space-xl);
}
.auth-logo-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto var(--space-md);
    background: linear-gradient(135deg, var(--primary-blue), var(--primary-red));
    border-radius: var(--radius-xl);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: var(--shadow-lg);
}
.auth-logo h2 {
    font-family: var(--font-heading);
    font-size: var(--text-2xl);
    font-weight: 800;
}
.auth-logo h2 span { color: var(--primary-blue); }
.auth-logo p {
    font-size: var(--text-sm);
    color: var(--text-muted);
    margin-top: var(--space-xs);
}

/* Tab Toggle */
.auth-tabs {
    display: flex;
    background: var(--gray-100);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: var(--space-xl);
}
.auth-tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: var(--text-sm);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--transition-fast);
    color: var(--text-muted);
    background: transparent;
    border: none;
}
.auth-tab.active {
    background: var(--white);
    color: var(--text-dark);
    box-shadow: var(--shadow-sm);
}

/* Form Panels */
.auth-panel { display: none; }
.auth-panel.active { display: block; }

/* Phone Input */
.phone-input-group {
    display: flex;
    gap: var(--space-sm);
}
.phone-prefix {
    flex-shrink: 0;
    width: 80px;
    padding: 12px 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-md);
    background: var(--gray-50);
    font-size: var(--text-base);
    font-weight: 600;
    color: var(--text-dark);
    text-align: center;
}
.phone-prefix:focus {
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 3px rgba(0, 32, 159, 0.1);
}
.phone-input-group .input { flex: 1; }

/* Forgot Link */
.forgot-link {
    display: block;
    text-align: right;
    font-size: var(--text-sm);
    color: var(--primary-red);
    font-weight: 500;
    margin-top: calc(-1 * var(--space-sm));
    margin-bottom: var(--space-md);
}
.forgot-link:hover { text-decoration: underline; }

/* OR Divider */
.or-divider {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: var(--space-xl) 0;
}
.or-divider::before,
.or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-200);
}
.or-divider span {
    font-size: var(--text-sm);
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
}

/* Social Buttons */
.social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-md);
    background: var(--white);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--text-dark);
    cursor: pointer;
    transition: all var(--transition-fast);
    margin-bottom: var(--space-sm);
}
.social-btn:hover {
    border-color: var(--gray-400);
    background: var(--gray-50);
}
.social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

/* User Type Selector */
.user-type-label {
    display: block;
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--gray-700);
    margin-bottom: var(--space-sm);
}
.user-type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-sm);
    margin-bottom: var(--space-md);
}
.user-type-card {
    position: relative;
    padding: var(--space-md) var(--space-sm);
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-md);
    text-align: center;
    cursor: pointer;
    transition: all var(--transition-fast);
}
.user-type-card:hover { border-color: var(--gray-400); }
.user-type-card.selected {
    border-color: var(--primary-blue);
    background: var(--primary-blue-light);
}
.user-type-card input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
}
.user-type-card .type-icon {
    font-size: 28px;
    margin-bottom: var(--space-xs);
    display: block;
}
.user-type-card .type-label {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--gray-700);
}
.user-type-card.selected .type-label { color: var(--primary-blue); }

/* Checkbox */
.checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: var(--space-sm);
    margin-bottom: var(--space-lg);
}
.checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin-top: 2px;
    accent-color: var(--primary-blue);
    flex-shrink: 0;
}
.checkbox-group label {
    font-size: var(--text-sm);
    color: var(--gray-600);
    line-height: 1.4;
}
.checkbox-group label a {
    color: var(--primary-blue);
    font-weight: 500;
}

/* OTP Verification */
.otp-section {
    display: none;
    text-align: center;
}
.otp-section.active { display: block; }
.otp-section h3 {
    font-family: var(--font-heading);
    font-size: var(--text-xl);
    margin-bottom: var(--space-sm);
}
.otp-section p {
    font-size: var(--text-sm);
    color: var(--text-muted);
    margin-bottom: var(--space-lg);
}
.otp-section .phone-highlight {
    font-weight: 600;
    color: var(--text-dark);
}
.otp-inputs {
    display: flex;
    justify-content: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-lg);
}
.otp-input {
    width: 48px;
    height: 56px;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius-md);
    text-align: center;
    font-size: var(--text-2xl);
    font-weight: 700;
    font-family: var(--font-heading);
    color: var(--text-dark);
    transition: border-color var(--transition-fast);
}
.otp-input:focus {
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 3px rgba(0, 32, 159, 0.1);
}
.resend-timer {
    font-size: var(--text-sm);
    color: var(--text-muted);
    margin-top: var(--space-md);
}
.resend-timer a {
    color: var(--primary-red);
    font-weight: 600;
    cursor: pointer;
}
.resend-timer a.disabled {
    color: var(--gray-400);
    cursor: not-allowed;
    pointer-events: none;
}
.otp-back {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: var(--text-sm);
    color: var(--text-muted);
    cursor: pointer;
    margin-top: var(--space-lg);
}
.otp-back:hover { color: var(--text-dark); }
</style>
</head>

<script>
// Tab toggle
const tabs = document.querySelectorAll('.auth-tab');
const panels = document.querySelectorAll('.auth-panel');
const otpSection = document.getElementById('otpSection');

tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        panels.forEach(p => p.classList.remove('active'));
        otpSection.classList.remove('active');
        document.getElementById(target + 'Panel').classList.add('active');
        // Update subtitle
        document.querySelector('.auth-logo p').textContent =
            target === 'login' ? 'Welcome back! Sign in to continue.' : 'Create your free account.';
    });
});

// User type radio cards
const typeCards = document.querySelectorAll('.user-type-card');
typeCards.forEach(card => {
    card.addEventListener('click', () => {
        typeCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
    });
});

// Sign up form -> OTP
document.getElementById('signupForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const phone = document.getElementById('signupPhone').value;
    document.getElementById('otpPhone').textContent = '+509 ' + phone;
    document.getElementById('signupPanel').classList.remove('active');
    otpSection.classList.add('active');
    document.querySelector('.auth-logo p').textContent = 'Verify your phone number.';
    startResendTimer();
    // Focus first OTP input
    document.querySelector('.otp-input').focus();
});

// OTP back button
document.getElementById('otpBack').addEventListener('click', () => {
    otpSection.classList.remove('active');
    document.getElementById('signupPanel').classList.add('active');
    document.querySelector('.auth-logo p').textContent = 'Create your free account.';
});

// OTP input auto-advance
const otpInputs = document.querySelectorAll('.otp-input');
otpInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;
        if (val && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
            otpInputs[index - 1].focus();
        }
    });
});

// Resend countdown timer
function startResendTimer() {
    let seconds = 30;
    const link = document.getElementById('resendLink');
    const countdown = document.getElementById('resendCountdown');
    link.classList.add('disabled');

    const interval = setInterval(() => {
        seconds--;
        countdown.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(interval);
            link.classList.remove('disabled');
            link.innerHTML = 'Resend Code';
            link.addEventListener('click', (e) => {
                e.preventDefault();
                link.innerHTML = 'Resend in <span id="resendCountdown">30</span>s';
                startResendTimer();
            }, { once: true });
        }
    }, 1000);
}

    e.preventDefault();
    alert('Login functionality will be connected to the backend.');
});
